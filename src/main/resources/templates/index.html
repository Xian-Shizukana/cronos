<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRONOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Fira+Mono:wght@400;500;700&family=VT323&display=swap" rel="stylesheet">
    
    <style>
        body{
            font-size: 28px;
            background-color: #11111b;
            color: #f5c2e7;
            font-family: "Fira Mono", monospace;
        }

        a{
            color: #1e1e2e;
            text-decoration: none;
        }

        h1{
            font-size: 300%;
        }

        h3{
            color:#f38ba8;
        }

        #achecker{
            background-color: #f5c2e7;
            padding:30px;
            transition-duration: 0.5s;
            border-radius: 20px;
            display:inline-block;
        }

        #achecker:hover{
            background-color: #f38ba8;
            transition-duration: 0.5s;
        }

        #alist{
            background-color: #f5c2e7;
            padding:30px;
            transition-duration: 0.5s;
            border-radius: 20px;
            display:inline-block;
        }

        #alist:hover{
            background-color:#f38ba8;
            transition-duration: 0.5s;
        }

        .container{
            text-align: center;
            width: 1000px;
            margin:auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>C.R.O.N.O.S</h1>
        <h3>Check-in Record Organizer for Notifications and Overview of Students</h3>
        <h2 id="achecker"><a href="/attendancechecker">Attendance Checker</a></h2>
        <br>
        <h2 id="alist"><a href="/attendancelist">Attendance List</a></h2>
    </div>
</body>
</html>
