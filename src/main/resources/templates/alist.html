

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>- List -</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Fira+Mono:wght@400;500;700&family=VT323&display=swap" rel="stylesheet">
    
    <style>
        body{
            font-size: 28px;
            background-color: #11111b;
            color: #f5c2e7;
            font-family: "Fira Mono", monospace;
        }

        table,th,td{
            border: 1px solid;
        }

        table{
            table-layout: auto;
            margin:auto;
            margin-top:50px;
        }

        a{
            color: #1e1e2e;
            text-decoration: none;
        }

        .filtercontainer{
            text-align: center;
            background-color:#45475a;
            width:750px;
            margin:auto;
            margin-top:50px;
            padding:20px;
            border-radius:20px;
        }

        #backbutton{
            text-align: center;
            background-color: #f5c2e7;;
            border-radius: 20px;
            width:500px;
            margin:auto;
            margin-top:50px;
            padding:20px;
            transition-duration: 0.5s;
        }

        #backbutton:hover{
            background-color: #f38ba8;
            transition-duration: 0.5s;
        }

        #filterbutton{
            color: #1e1e2e;
            font-family: "Fira Mono", monospace;
            font-size:100%;
            text-align: center;
            background-color: #f5c2e7;
            border-radius: 20px;
            width:200px;
            padding:20px;
            border-style: none;
            transition-duration: 0.5s;
        }

        #filterbutton:hover{
            background-color: #f38ba8;
            transition-duration: 0.5s;
        }

        #startingdate, #endingdate{
            font-family: "Fira Mono", monospace;
            padding:20px;
            border-radius: 20px;
            border-style: none;
            margin-top:20px;
            background-color: #f38ba8;
        }
    </style>
</head>
<body>
    <h2 id="backbutton"><a href="/">Back to Home</a></h2>

    <div class="filtercontainer">
        <form action="/submitDateTime" method="POST" onsubmit="return validateDates(event)">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label for="startingdate">Starting Date:</label>
            <br>
            <input type="datetime-local" id="startingdate" name="startingdate" required>
            <br>
            <hr>
            <label for="endingdate">Ending Date:</label>
            <br>
            <input type="datetime-local" id="endingdate" name="endingdate" required>
            <br><br>
            <input type="submit" value="Filter" id="filterbutton">
        </form>
        
        <p id="error-message" style="color: #f38ba8; display: none;">Starting date cannot be later than ending date.</p>
    </div>
    
    <!-- Gives an error if the starting date is later than the ending date -->
    <script>
        function validateDates(event) {
            const startingDate = document.getElementById("startingdate").value;
            const endingDate = document.getElementById("endingdate").value;

            if (startingDate && endingDate) {
                const start = new Date(startingDate);
                const end = new Date(endingDate);

                if (start > end) {
                    const errorMessage = document.getElementById("error-message");
                    errorMessage.style.display = "block"; // Show the error message
                    return false; // Prevent the form from being submitted
                }
            }

            return true; // Allow the form submission if validation passes
        }
    </script>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>First Name</th>
                <th>Middle Name</th>
                <th>Last Name</th>
                <th>Strand</th>
            </tr>
        </thead>
        <tbody>
            <!-- Loop through the students and display each one -->
            <tr th:each="student : ${students}">
                <td th:text="${student.id}"></td>
                <td th:text="${student.fname}"></td>
                <td th:text="${student.mname}"></td>
                <td th:text="${student.lname}"></td>
                <td th:text="${student.strand}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
